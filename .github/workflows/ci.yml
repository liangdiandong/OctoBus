name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*
      - sdk-v*

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check public traces
        run: |
          patterns=(
            "npm.in"'.chaitin.net'
            "git.in"'.chaitin.net'
            "gitlab"'-ci'
            "CI_"'JOB'
            "CI_"'COMMIT'
            "strict"'-ssl'
          )
          args=()
          for pattern in "${patterns[@]}"; do
            args+=("-e" "$pattern")
          done
          if git grep -n -F "${args[@]}" -- \
            README.md .github Taskfile.yml scripts internal cmd examples services sdk npm docs/design; then
              echo "::error::public trace scan found internal development or build traces"
              exit 1
          else
            status=$?
            if [ "$status" -eq 1 ]; then
              exit 0
            fi
            exit "$status"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Check Go formatting
        run: |
          unformatted="$(
            git ls-files -z --cached --others --exclude-standard -- '*.go' |
              xargs -0r gofmt -l
          )"
          if [ -n "$unformatted" ]; then
            echo "gofmt required for:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./cmd/... ./internal/...

      - name: Build octobus
        run: |
          bash ./scripts/build-octobus.sh bin/octobus
          if ldd bin/octobus 2>&1 | grep -q "not a dynamic executable"; then
            exit 0
          fi
          echo "::error::bin/octobus is dynamically linked; expected a static binary"
          ldd bin/octobus
          exit 1

      - name: Check OctoBus npm packages
        run: bash ./scripts/build-octobus-npm-packages.sh --dry-run

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci

      - name: Test SDK
        working-directory: sdk
        run: npm test

      - name: Build SDK
        working-directory: sdk
        run: npm run build

      - name: Check SDK package
        working-directory: sdk
        run: npm pack --dry-run

  publish-sdk:
    name: publish SDK
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Validate tag
        id: release
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^sdk-v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::tag '$tag' must match sdk-v<semver>"
            exit 1
          fi

          tag_version="${tag#sdk-v}"
          package_version="$(node -p "require('./sdk/package.json').version")"
          if [ "$tag_version" != "$package_version" ]; then
            echo "::error::tag version '$tag_version' does not match sdk/package.json version '$package_version'"
            exit 1
          fi

          if [[ "$package_version" == *-* ]]; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci

      - name: Test SDK
        working-directory: sdk
        run: npm test

      - name: Build SDK
        working-directory: sdk
        run: npm run build

      - name: Check SDK package
        working-directory: sdk
        run: npm pack --dry-run

      - name: Check npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is required to publish @chaitin-ai/octobus-sdk"
            exit 1
          fi

      - name: Publish prerelease SDK
        if: steps.release.outputs.dist_tag == 'next'
        working-directory: sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance --tag next

      - name: Publish stable SDK
        if: steps.release.outputs.dist_tag == 'latest'
        working-directory: sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

  publish-octobus:
    name: publish OctoBus
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Validate tag
        id: release
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::tag '$tag' must match v<semver>"
            exit 1
          fi

          tag_version="${tag#v}"
          package_version="$(node -p "require('./npm/octobus/package.json').version")"
          if [ "$tag_version" != "$package_version" ]; then
            echo "::error::tag version '$tag_version' does not match npm/octobus/package.json version '$package_version'"
            exit 1
          fi

          if [[ "$package_version" == *-* ]]; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and check OctoBus npm packages
        env:
          OCTOBUS_VERSION: ${{ github.ref_name }}
        run: bash ./scripts/build-octobus-npm-packages.sh --dry-run

      - name: Check npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is required to publish @chaitin-ai/octobus"
            exit 1
          fi

      - name: Publish prerelease OctoBus packages
        if: steps.release.outputs.dist_tag == 'next'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish_args=(--access public --provenance --tag next)
          for package_dir in \
            npm/octobus-linux-x64 \
            npm/octobus-linux-arm64 \
            npm/octobus-darwin-x64 \
            npm/octobus-darwin-arm64 \
            npm/octobus-win32-x64 \
            npm/octobus-win32-arm64; do
            npm publish "./$package_dir" "${publish_args[@]}"
          done
          npm publish ./npm/octobus "${publish_args[@]}"

      - name: Publish stable OctoBus packages
        if: steps.release.outputs.dist_tag == 'latest'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish_args=(--access public --provenance)
          for package_dir in \
            npm/octobus-linux-x64 \
            npm/octobus-linux-arm64 \
            npm/octobus-darwin-x64 \
            npm/octobus-darwin-arm64 \
            npm/octobus-win32-x64 \
            npm/octobus-win32-arm64; do
            npm publish "./$package_dir" "${publish_args[@]}"
          done
          npm publish ./npm/octobus "${publish_args[@]}"
